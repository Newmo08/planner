<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Planner - Dashboard</title>
	<link rel="stylesheet" href="main.css" />
	<link rel="manifest" href="manifest.json" />
	<link rel="icon" href="icon.svg" type="image/svg+xml" />
	<meta name="theme-color" content="#ffffff" />
</head>
<header class="topbar">
	<img src="icon.svg" alt="Planner Logo" class="logo" />
</header>
<body>
	
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			<h2>Menu</h2>

			<nav class="todolist">
				<p>My To-Do List</p>
				<form id="todo-form" class="todolist-form">
					<input id="todo-input" type="text" placeholder="Add a new task" autocomplete="off" />
					<button type="submit">Add</button>
				</form>
				<ul id="todo-list" class="todo-items"></ul>
			</nav>
			
			<nav class="menu">
				<a href="index.html" class="menu-item is-active">Dashboard</a>
				<a href="calendar.html" class="menu-item">Calendar</a>
				<a href="resources.html" class="menu-item">Resources</a>
				<a href="#" class="menu-item unavailable">Messaging</a>
			</nav>

		</aside>

		<main class="content">
			<h1>Dashboard</h1>
			<div class="dashboard-grid">
				<section class="focus-timer">
					<h2>Focus Timer</h2>
					<div class="timer-card">
						<div id="timer-display" class="timer-display">25:00</div>
						<div class="timer-controls">
							<button id="timer-start" type="button">Start</button>
							<button id="timer-pause" type="button">Pause</button>
							<button id="timer-reset" type="button">Reset</button>
						</div>
						<div class="timer-settings">
							<label for="timer-minutes">Minutes</label>
							<input id="timer-minutes" type="number" min="1" max="120" value="25" />
						</div>
					</div>
				</section>
				<section class="reminder">
					<h2>Reminder</h2>
					<div class="reminder-random">
						<h3>Reminder</h3>
					</div>
				</section>
			</div>
		</main>
	</div>

	<script src="main.js"></script>
</body>
</html>
