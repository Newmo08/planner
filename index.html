<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Planner - Calender</title>
	<link rel="stylesheet" href="main.css" />
</head>
<header class="topbar">
		
</header>
<body>
	
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			<h2>Menu</h2>

			<nav class="todolist">
				<p>My To-Do List</p>
				<form id="todo-form" class="todolist-form">
					<input id="todo-input" type="text" placeholder="Add a new task" autocomplete="off" />
					<button type="submit">Add</button>
				</form>
				<ul id="todo-list" class="todo-items"></ul>
			</nav>
			
			<nav class="menu">
				<a href="index.html" class="menu-item is-active">Dashboard</a>
				<a href="resources.html" class="menu-item">Resources</a>
			</nav>

		</aside>

		<main class="content">
			<h1>Calendar</h1>
			<section class="planner">
				<div class="planner-controls">
					<button id="prev-day" aria-label="Previous day">‹</button>
					<input type="date" id="planner-date" />
					<button id="next-day" aria-label="Next day">›</button>
				</div>
				<div class="planner-columns">
					<div class="planner-tasks">
						<h2>Tasks</h2>
						<form id="planner-task-form">
							<input id="planner-task-input" type="text" placeholder="Add a task" autocomplete="off" />
							<button type="submit">Add</button>
						</form>
						<ul id="planner-task-list" class="todo-items"></ul>
					</div>
					<div class="planner-notes">
						<h2>Notes</h2>
						<textarea id="planner-note" placeholder="Daily notes"></textarea>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script src="main.js"></script>
</body>
</html>
