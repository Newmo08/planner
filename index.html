		<main class="content">
			<h1>Dashboard</h1>
				<nav class="info">
					<h2>Notes</h2>
					<p>
						Welcome to StudySite<br>
						Here you can find all your notes, to-do lists, and study materials in one place.<br>
						Use the menu on the left to navigate through different subjects and access your resources.
