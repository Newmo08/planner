<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>StudySite - Humanities</title>
	<link rel="stylesheet" href="main.css" />
</head>
<header class="topbar">
		
</header>
<body>
	
	<div class="app">
		<div class="menu-toggle">
			<div class="hamburger">
				<span></span>
			</div>
		</div>

		<aside class="sidebar">
			<h2>Menu</h2>

			<nav class="todolist">
				<p>My To-Do List</p>
				<form id="todo-form" class="todolist-form">
					<input id="todo-input" type="text" placeholder="Add a new task" autocomplete="off" />
					<button type="submit">Add</button>
				</form>
				<ul id="todo-list" class="todo-items"></ul>
			</nav>

			<nav class="menu">
				<a href="index.html" class="menu-item">Dashboard</a>
				<a href="math.html" class="menu-item">Math</a>
				<a href="english.html" class="menu-item">English</a>
				<a href="science.html" class="menu-item">Science</a>
				<a href="humanities.html" class="menu-item is-active">Humanities</a>
			</nav>

		</aside>

		<main class="content">
			<h1>Humanities</h1>
			<nav class="info">
				<h2>Notes</h2>
				<p>Write your study notes below. They are saved automatically for next time.</p>
				<textarea id="note-area" placeholder="Write your notes here..."></textarea>
			</nav>
			<section class="drag-drop">
				<h2>Drag files from your computer</h2>
				<div class="drag-drop-grid">
					<div class="drag-column">
						<h3>Drop files here</h3>
						<div class="drop-zone" data-zone="plan">
							<p class="drag-drop-note">Drag files from your desktop into this area.</p>
						</div>
					</div>
				</div>
			</section>
		</main>
	</div>

	<script src="main.js"></script>
</body>
</html>
